name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build design system library
      - name: Install design system dependencies
        run: npm ci

      - name: Build design system
        run: npm run build

      # Build docs site
      - name: Copy CLAUDE.md into docs public folder
        run: cp CLAUDE.md docs/public/CLAUDE.md

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build

      # Merge outputs: docs/dist becomes the root, design system dist is also available
      - name: Prepare deploy folder
        run: |
          mkdir -p _site
          cp -r docs/dist/* _site/
          mkdir -p _site/lib
          cp -r dist/* _site/lib/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
